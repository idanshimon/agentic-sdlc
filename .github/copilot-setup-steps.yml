name: Copilot setup steps

# Deterministic environment preparation for Copilot cloud agent sessions.
# This workflow installs dependencies only; governance remains in rulesets,
# required checks, hooks, and server-side gates.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
      - name: Enable Corepack
        run: corepack enable
      - name: Install UI dependencies
        working-directory: apps/ledger-insights-ui
        run: pnpm install --frozen-lockfile
      - name: Install orchestrator dependencies
        run: python -m pip install --disable-pip-version-check -r apps/orchestrator/requirements.txt
      - name: Validate environment
        run: |
          python -m py_compile apps/orchestrator/main.py
          cd apps/ledger-insights-ui && pnpm tsc --noEmit
