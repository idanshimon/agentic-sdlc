name: autonomous-review-loop

# The external trigger surface for the autonomous review→remediate→re-review
# loop (add-autonomous-review-loop). Fires when a Coding Agent (or anyone)
# opens/updates a pull request on this repository — the "arbitrary Coding Agent
# PR" case that never runs the orchestrator pipeline internally.
#
# This workflow NOTIFIES the orchestrator's review-loop controller. The loop
# itself is bounded and governed server-side: the repo's autonomy tier
# (repo_autonomy.yaml) decides whether it may auto-merge (Tier A), await a human
# merge (Tier B), or only comment (Tier C — the default for any unlisted repo).
# PHI/auth/deny blockers always force human escalation regardless of tier.
#
# ORCHESTRATOR_URL + a dispatch token are provided as repo/environment config on
# the DELIVERY repo where the loop operates; on a repo without them the workflow
# is a no-op (safe by absence — the loop never runs where it isn't configured).

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write   # to post the advisory verdict comment

jobs:
  dispatch-loop:
    name: dispatch-review-loop
    runs-on: ubuntu-latest
    steps:
      - name: Guard — only run where the loop is configured
        id: guard
        run: |
          if [ -z "${{ vars.ORCHESTRATOR_URL }}" ]; then
            echo "ORCHESTRATOR_URL not set — loop not configured on this repo; no-op."
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Notify the review-loop controller
        if: steps.guard.outputs.configured == 'true'
        env:
          ORCHESTRATOR_URL: ${{ vars.ORCHESTRATOR_URL }}
          DISPATCH_TOKEN: ${{ secrets.REVIEW_LOOP_DISPATCH_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          test -n "${DISPATCH_TOKEN}" || { echo "REVIEW_LOOP_DISPATCH_TOKEN is required" >&2; exit 1; }
          # The token is validated server-side and maps only to github_workload.
          curl -fsS --retry 2 --retry-all-errors -X POST "${ORCHESTRATOR_URL%/}/api/review-loops" \
            -H "Authorization: Bearer ${DISPATCH_TOKEN}" \
            -H "Idempotency-Key: ${REPO}:${PR_NUMBER}:${HEAD_SHA}" \
            -H "Content-Type: application/json" \
            -d "{\"repo\":\"${REPO}\",\"pr_number\":${PR_NUMBER},\"head_sha\":\"${HEAD_SHA}\"}"
