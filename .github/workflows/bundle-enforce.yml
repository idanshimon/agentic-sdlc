name: bundle-enforce

# Third bundle enforcement surface (the ci_checks lane): runs the deterministic
# subset of review-scan against a PR's changed files. Fires on ANY pull request
# — including a cloud Coding Agent PR that never runs the orchestrator — and is
# the un-bypassable floor beneath the autonomous review loop.
#
# Runs with NO repository secret: only the checked-out repo + PyYAML.
#
# NOTE: adding this workflow does NOT by itself block merges. It reports an
# ordinary check. To make it a merge gate, an administrator must add the
# "bundle-enforce" check to the branch's required-status-check set:
#   Settings -> Branches -> Branch protection rule -> Require status checks
#   to pass -> add "bundle-enforce".

on:
  pull_request:
    branches: ["**"]

permissions:
  contents: read
  pull-requests: read

jobs:
  enforce:
    name: bundle-enforce
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for diff)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"

      - name: Install PyYAML (only dependency)
        run: python -m pip install --quiet pyyaml

      - name: Compute changed files vs base
        id: diff
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          # Robust three-dot diff against the merge base; only Added/Copied/Modified.
          git diff --name-only --diff-filter=ACM "$base"..."$head" > changed.txt || \
            git diff --name-only --diff-filter=ACM "$base" "$head" > changed.txt
          echo "----- changed files -----"
          cat changed.txt

      - name: Run bundle enforcer
        # --team defaults resolves the default pinned bundle versions. A team
        # can be passed if the delivery repo maps to a specific pinned team.
        # --stdin reads the newline-delimited changed files.
        run: |
          if [ ! -s changed.txt ]; then
            echo "No changed files to scan."
            python scripts/enforce_bundles.py --team defaults \
              --result-json bundle-enforce-result.json \
              --pr-ref "${{ github.event.pull_request.number }}" < /dev/null || true
            exit 0
          fi
          python scripts/enforce_bundles.py --team defaults --stdin \
            --result-json bundle-enforce-result.json \
            --pr-ref "${{ github.event.pull_request.number }}" < changed.txt

      - name: Upload result artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: bundle-enforce-result
          path: bundle-enforce-result.json
          if-no-files-found: ignore
