model_compat_notes: |-
  OpenAI chat shape: JSON-mode safe, 128K ctx via APIM. Anthropic messages shape: prefers explicit 'no markdown fences' instruction, 200K ctx. Databricks-Claude: same prompt shape as native Anthropic. Gemini: tolerates OpenAI-shaped messages via APIM passthrough.
