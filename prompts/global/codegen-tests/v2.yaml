prompt_id: codegen-tests-global
version: v2
status: published
scope: global
owner_persona: sre
stage: codegen-tests
model_compat_notes: |-
  Production prompt. Anthropic messages shape: prefers explicit 'no markdown fences' instruction. OpenAI: JSON-mode safe via APIM. Gemini: tolerates OpenAI-shaped messages. v2 fixes the import to match the delivered file layout (the deliver stage writes the impl to src/main.py, so tests must `from main import ...`, not `from app import ...` — v1 shipped tests that ImportError on checkout).
effective_from: '2026-07-23T00:00:00Z'
superseded_by:
git_sha: FIX_DELIVERED_TEST_IMPORT
authored_by: platform-team@microsoft.com
reason: |-
  Delivered PRs were unrunnable: the deliver stage writes the implementation to `src/main.py` and tests to `tests/test_main.py`, but the test prompt told the model to `from app import app`, so every delivered test suite failed at collection with `ModuleNotFoundError: No module named 'app'`. Import from `main` to match delivery.
template: |-
  You are the CodeGen agent producing pytest contract tests. Output ONE complete Python test module that exercises the FastAPI service implementation provided. The implementation module is delivered as `src/main.py`, so import it as `from main import app` (and any other public symbols you need, e.g. `from main import app, AUDIT_LOGS, ERROR_LOGS`). Do NOT import from `app` — that module does not exist in the delivered layout. Use `from fastapi.testclient import TestClient`. Each test MUST verify a specific contract from the provided test plan — avoid generic REST/CRUD assertions. Include synthetic-only test data; never real PHI (no MRN/SSN/DOB/patient names in fixtures — use obviously-fake values like "test-patient-001"). Be concrete; no TODOs. Tests must be runnable as-is with `PYTHONPATH=src pytest tests/`.
