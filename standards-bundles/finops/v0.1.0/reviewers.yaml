blast_classes:
  HIGH:
    required_approvers: 2
    must_include_roles: [finops_lead, architect_lead]
    can_include_roles: [security_lead]
  MED:
    required_approvers: 2
    must_include_roles: [finops_lead]
    can_include_roles: [architect_lead]
  LOW:
    required_approvers: 1
    must_include_roles: [finops_lead]
  AUTO:
    required_approvers: 0  # Pipeline Doctor within envelope

people:
  finops_lead:
    - "finops-lead@example.com"
  architect_lead:
    - "architect-lead@example.com"
  security_lead:
    - "security-lead@example.com"
