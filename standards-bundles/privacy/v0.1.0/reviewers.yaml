blast_classes:
  HIGH:
    required_approvers: 3
    must_include_roles: [privacy_dpo, legal]
    can_include_roles: [security_lead, architect_lead]
  MED:
    required_approvers: 2
    must_include_roles: [privacy_dpo]
    can_include_roles: [legal, security_lead]
  LOW:
    required_approvers: 1
    must_include_roles: [privacy_dpo]
  AUTO:
    required_approvers: 0  # never reached

people:
  privacy_dpo:
    - "privacy-dpo@example.com"
  legal:
    - "legal@example.com"
  security_lead:
    - "security-lead@example.com"
  architect_lead:
    - "architect-lead@example.com"
